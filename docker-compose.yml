services:
  db:
    image: pgvector/pgvector:pg16
    container_name: paperstack-db
    environment:
      POSTGRES_USER: paperstack
      POSTGRES_PASSWORD: paperstack
      POSTGRES_DB: paperstack
    ports:
      - "5432:5432"
    volumes:
      - paperstack-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperstack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  paperstack-db-data:
