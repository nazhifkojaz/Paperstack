services:
  api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    env_file:
      - ${PAPERSTACK_ENV_FILE:-packages/backend/.env}
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: /v1
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
