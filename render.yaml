services:
  - type: web
    name: paperstack-api
    env: python
    buildCommand: "cd packages/backend && pip install uv && uv sync"
    startCommand: "cd packages/backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperstack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://nazhifkjaz.github.io/Paperstack

databases:
  - name: paperstack-db
    plan: free
