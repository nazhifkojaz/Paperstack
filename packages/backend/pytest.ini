[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (run with '-m slow'; skipped by default)
addopts =
    -v
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --tb=short
    -m "not slow"
filterwarnings =
    ignore::DeprecationWarning
